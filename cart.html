<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart — Smart Canteen</title>
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <!-- CSS -->
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="cart.css">
</head>
<body>

  <!-- ░░░ HEADER ░░░ -->
  <header id="main-header">
    <div class="header-inner">
      <div class="header-left">
        <a href="index.html" class="hdr-back-btn" title="Change canteen">←</a>
        <img src="Images/logo.png" alt="" class="hdr-logo"
             onerror="this.style.display='none'">
        <div class="hdr-text">
          <span class="hdr-brand">Smart Canteen</span>
          <span class="hdr-sub" id="canteen-label">—</span>
        </div>
      </div>
      <a href="cart.html" class="cart-btn">
        <span>🛒</span>
        <span class="cart-count" id="cart-count">0</span>
      </a>
    </div>
  </header>

  <!-- ░░░ CART PAGE ░░░ -->
  <main class="page-wrapper">

    <!-- Page title row -->
    <div class="page-header">
      <a href="menu.html" class="pg-back-btn">← Menu</a>
      <h2 class="page-title">Your Order</h2>
      <span></span>
    </div>

    <!-- Empty state -->
    <div id="cart-empty" class="cart-empty" style="display:none">
      <div class="empty-icon">🛒</div>
      <h3>Cart is empty</h3>
      <p>Add some delicious items from the menu</p>
      <a href="menu.html" class="btn-primary">Browse Menu</a>
    </div>

    <!-- Cart content -->
    <div id="cart-content" style="display:none">
      <div class="cart-items-list" id="cart-items-list"></div>

      <div class="summary-card">
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="summary-subtotal">₹0</span>
        </div>
        <div class="summary-row">
          <span>Taxes &amp; Charges (5%)</span>
          <span id="summary-tax">₹0</span>
        </div>
        <div class="summary-row total-row">
          <span>Total Amount</span>
          <span id="summary-total">₹0</span>
        </div>
        <!-- Links to payment.html -->
        <a href="payment.html" class="btn-primary btn-checkout">Proceed to Payment →</a>
      </div>
    </div>

  </main>

  <!-- JS -->
  <script src="store.js"></script>
  <script src="cart.js"></script>
</body>
</html>
